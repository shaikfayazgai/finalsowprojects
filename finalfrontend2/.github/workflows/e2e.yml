name: E2E Playwright

on:
  push:
    branches: [main, mentor-portal-v2]
  pull_request:
    branches: [main, mentor-portal-v2]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glimmora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/glimmora_test
      NEXTAUTH_SECRET: e2e-test-secret-min-32-chars-long!!
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate and migrate
        working-directory: frontend
        run: |
          npm run db:generate
          npm run db:migrate

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Generate flow report
        working-directory: frontend
        run: npm run test:e2e:flow-report

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/report/html

      - name: Upload flow report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-report
          path: docs/e2e/FLOW-REPORT.md
