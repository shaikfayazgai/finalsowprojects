# ============================================================================
# Kong declarative config (DB-less mode).
# Single public entry on :9000 → routes by path prefix to internal services.
# Services are NOT exposed directly; only Kong's proxy port is published.
# ============================================================================
_format_version: "3.0"
_transform: true

services:
  # ── Shared auth: /api/v1/auth/** ──────────────────────────────────────────
  - name: auth-service
    url: http://auth-service:8000
    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        strip_path: false

  # ── Contributor / freelancer (incl. OAuth): /api/contributor/**, /api/public/** ─
  - name: contributor-service
    url: http://contributor-service:8000
    routes:
      - name: contributor-routes
        paths:
          - /api/contributor
          - /api/public/credentials
          - /api/v1/auth/oauth
          - /api/v1/auth/contributor
        strip_path: false

  # ── Enterprise + SOW + decomposition ─────────────────────────────────────
  - name: enterprise-service
    url: http://enterprise-service:8000
    routes:
      - name: enterprise-routes
        paths:
          - /api/v1/sow
          - /api/v1/sows
          - /api/v1/wizards
          - /api/v1/approvals
          - /api/v1/enterprise
          - /api/v1/portfolio
          - /api/v1/projects
          - /api/v1/billing
          - /api/v1/review
          - /api/v1/internal
          - /api/enterprise
        strip_path: false
      # /api/v1/users/search and /api/v1/users/me go to enterprise
      # (more specific superadmin paths below win via longer prefix match)
      - name: enterprise-users-routes
        paths:
          - /api/v1/users
        strip_path: false

  # ── Super admin: longer prefixes win over enterprise's /api/v1/users ───────
  - name: superadmin-service
    url: http://superadmin-service:8000
    routes:
      - name: superadmin-routes
        paths:
          - /api/superadmin
          - /api/admin
          - /api/v1/admin
          - /api/v1/users/reviewers
          - /api/v1/reviewer
          - /api/v1/settings/contributor-pricing
          - /api/v1/config/contributor-pricing
        strip_path: false
      # POST /api/v1/users (create users/reviewers) routes to superadmin
      - name: superadmin-create-user
        paths:
          - /api/v1/users
        methods: [POST]
        strip_path: false

  # ── Universities portal: /api/universities/** ─────────────────────────────
  - name: universities-service
    url: http://universities-service:8000
    routes:
      - name: universities-routes
        paths:
          - /api/universities
        strip_path: false

  # ── Women team portal: /api/women/** ──────────────────────────────────────
  - name: women-service
    url: http://women-service:8000
    routes:
      - name: women-routes
        paths:
          - /api/women
        strip_path: false

  # ── Mentor portal: /api/mentor/** ─────────────────────────────────────────
  - name: mentor-service
    url: http://mentor-service:8000
    routes:
      - name: mentor-routes
        paths:
          - /api/mentor
        strip_path: false

  # ── Email service: /api/email/** ──────────────────────────────────────────
  - name: email-service
    url: http://email-service:8000
    routes:
      - name: email-routes
        paths:
          - /api/email
        strip_path: false

  # ── File service (Vercel Blob): /api/files/** ─────────────────────────────
  - name: file-service
    url: http://file-service:8000
    routes:
      - name: file-routes
        paths:
          - /api/files
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://127.0.0.1:3000
        - http://localhost:3100
        - http://127.0.0.1:3100
      methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
      headers: [Accept, Authorization, Content-Type, X-Contributor-Id, X-Requested-With]
      credentials: true
      max_age: 3600
  - name: request-size-limiting
    config:
      allowed_payload_size: 50   # MB — large enough for SOW/Excel uploads
