name: Release Regression

on:
  workflow_dispatch:
    inputs:
      run_target:
        description: "Run target"
        required: true
        default: "ci"
        type: choice
        options:
          - ci
          - staging
      staging_base_url:
        description: "Required when run_target=staging (example: https://staging.glimmorateam.ai)"
        required: false
        type: string

jobs:
  ci-release-regression:
    if: ${{ inputs.run_target == 'ci' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: glimmora_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/glimmora_test
      NEXTAUTH_SECRET: e2e-test-secret-min-32-chars-long!!
      NEXTAUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate and migrate
        working-directory: frontend
        run: |
          npm run db:generate
          npm run db:migrate

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build

      - name: Start app
        working-directory: frontend
        run: |
          npm run start -- -p 3000 > /tmp/next.log 2>&1 &
          for i in {1..60}; do
            if curl -fsS http://localhost:3000/auth/login > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 2
          done
          echo "App did not become ready in time"
          cat /tmp/next.log || true
          exit 1

      - name: Run release regression suite
        working-directory: frontend
        run: npm run test:e2e:release

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-regression-playwright-report
          path: frontend/e2e/report/html

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-regression-results-json
          path: frontend/e2e/report/results.json

      - name: Upload app log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-regression-next-log
          path: /tmp/next.log

  staging-release-regression:
    if: ${{ inputs.run_target == 'staging' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validate staging URL
        run: |
          if [ -z "${{ inputs.staging_base_url }}" ]; then
            echo "staging_base_url is required when run_target=staging"
            exit 1
          fi
          if ! echo "${{ inputs.staging_base_url }}" | grep -Eq '^https?://'; then
            echo "staging_base_url must start with http:// or https://"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps

      - name: Run release regression suite on staging
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ inputs.staging_base_url }}
        run: npm run test:e2e:release:staging

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-regression-playwright-report
          path: frontend/e2e/report/html

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-release-regression-results-json
          path: frontend/e2e/report/results.json
