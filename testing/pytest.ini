# pytest configuration for API testing

[pytest]
# Minimum version
minversion = 7.0

# Test paths
testpaths = testing/api-testing
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    auth: Authentication service tests
    oauth: OAuth tests
    enterprise: Enterprise service tests
    contributor: Contributor service tests
    superadmin: Superadmin service tests
    bulk_import: Bulk import tests
    files: File service tests
    email: Email service tests
    slow: Slow running tests
    integration: Integration tests
    flaky: Flaky tests that may retry

# Output options
console_output_style = progress
# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 30
timeout_method = thread

# Coverage
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes
    -ra

# Asyncio
asyncio_mode = auto
